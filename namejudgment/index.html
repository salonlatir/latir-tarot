<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伶受の姓名判断 | Latir</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="apple-touch-icon" href="./namejudgment-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Latir姓名判断">
  <link rel="icon" type="image/png" sizes="192x192" href="./namejudgment-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cinzel:wght@400;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0800;color:#e8e0d0;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:24px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(201,168,76,.09) 0%,transparent 70%);pointer-events:none}
    .container{text-align:center;position:relative;z-index:1;animation:fadeIn .8s ease both;max-width:360px;width:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .icon-wrap{width:110px;height:110px;margin:0 auto 24px;border-radius:24px;overflow:hidden;box-shadow:0 0 40px rgba(201,168,76,.3),0 8px 32px rgba(0,0,0,.8);animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 28px rgba(201,168,76,.2),0 8px 32px rgba(0,0,0,.8)}50%{box-shadow:0 0 52px rgba(201,168,76,.45),0 8px 32px rgba(0,0,0,.8)}}
    .icon-wrap img{width:100%;height:100%;object-fit:cover}
    .eyebrow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.35em;color:#c9a84c;text-transform:uppercase;margin-bottom:10px;opacity:.75}
    h1{font-size:22px;font-weight:300;letter-spacing:.12em;color:#e8d08a;margin-bottom:6px;line-height:1.5}
    .sub{font-size:11px;color:#7a7060;letter-spacing:.06em;margin-bottom:32px}

    /* 手順ボックス */
    .steps-box{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);border-radius:4px;padding:20px 18px;margin-bottom:24px;text-align:left}
    .steps-box h2{font-size:12px;letter-spacing:.1em;color:#c9a84c;margin-bottom:14px;text-align:center}
    .step{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
    .step:last-child{margin-bottom:0}
    .step-n{width:22px;height:22px;border:1px solid rgba(201,168,76,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#c9a84c;flex-shrink:0;margin-top:1px}
    .step-t{font-size:12px;color:#b0a890;line-height:1.7;letter-spacing:.04em}
    .step-t strong{color:#d8c878}

    /* OS切り替え */
    .os-toggle{display:flex;border:1px solid rgba(201,168,76,.2);border-radius:3px;overflow:hidden;margin-bottom:16px}
    .os-btn{flex:1;padding:8px;font-family:'Noto Serif JP',serif;font-size:11px;color:#6a6055;background:transparent;border:none;cursor:pointer;letter-spacing:.05em;transition:all .2s}
    .os-btn.active{background:rgba(201,168,76,.1);color:#c9a84c}
    .os-btn:first-child{border-right:1px solid rgba(201,168,76,.2)}
    .os-content{display:none}.os-content.active{display:block}

    /* 開くボタン */
    .open-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.06));border:1px solid rgba(201,168,76,.5);border-radius:3px;color:#e8d08a;text-decoration:none;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.1em;text-align:center;transition:all .25s;position:relative;overflow:hidden}
    .open-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.12),transparent);opacity:0;transition:opacity .25s}
    .open-btn:active::before{opacity:1}
    .open-btn span{display:block;font-size:11px;color:#8a7a60;margin-top:4px;letter-spacing:.05em}

    .divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);margin:20px auto}

    /* 星 */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
    .star{position:absolute;background:#c9a84c;border-radius:50%;animation:twinkle var(--dur) var(--delay) ease-in-out infinite}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.6}}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="icon-wrap">
      <img src="./namejudgment-512.png" alt="姓名判断">
    </div>
    <div class="eyebrow">Latir × 占いの部屋</div>
    <h1>🐉 姓名判断</h1>
    <p class="sub">ホーム画面に追加してね</p>

    <!-- OS切り替え -->
    <div class="os-toggle">
      <button class="os-btn active" onclick="switchOS('ios',this)">🍎 iPhone</button>
      <button class="os-btn" onclick="switchOS('android',this)">🤖 Android</button>
    </div>

    <!-- iOS手順 -->
    <div id="ios" class="os-content steps-box active">
      <h2>📌 ホーム画面への追加手順</h2>
      <div class="step"><div class="step-n">1</div><div class="step-t">画面下の <strong>共有ボタン（📤）</strong> をタップ</div></div>
      <div class="step"><div class="step-n">2</div><div class="step-t">メニューをスクロールして <strong>「ホーム画面に追加」</strong> をタップ</div></div>
      <div class="step"><div class="step-n">3</div><div class="step-t"><strong>「追加」</strong> をタップして完了🎉<br>ホーム画面に龍神アイコンが現れます</div></div>
      <div class="step"><div class="step-n">4</div><div class="step-t">追加できたら下のボタンで占いへ✨</div></div>
    </div>

    <!-- Android手順 -->
    <div id="android" class="os-content steps-box">
      <h2>📌 ホーム画面への追加手順</h2>
      <div class="step"><div class="step-n">1</div><div class="step-t">右上の <strong>メニュー（⋮）</strong> をタップ</div></div>
      <div class="step"><div class="step-n">2</div><div class="step-t"><strong>「ホーム画面に追加」</strong> をタップ</div></div>
      <div class="step"><div class="step-n">3</div><div class="step-t"><strong>「追加」</strong> をタップして完了🎉<br>ホーム画面に龍神アイコンが現れます</div></div>
      <div class="step"><div class="step-n">4</div><div class="step-t">追加できたら下のボタンで占いへ✨</div></div>
    </div>

    <div class="divider"></div>

    <!-- 占いを開くボタン -->
    <a class="open-btn" href="https://salonlatir.wixsite.com/salon/namejudgment">
      ✦ 姓名判断を開く
      <span>ホーム追加後にタップしてね</span>
    </a>
  </div>

  <script>
    if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(():{});

    function switchOS(os, btn) {
      document.querySelectorAll('.os-content').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.os-btn').forEach(el=>el.classList.remove('active'));
      document.getElementById(os).classList.add('active');
      btn.classList.add('active');
    }

    // Android自動判定
    if(/Android/.test(navigator.userAgent)) {
      document.querySelectorAll('.os-btn').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.os-content').forEach(el=>el.classList.remove('active'));
      document.getElementById('android').classList.add('active');
      document.querySelector('.os-btn:last-child').classList.add('active');
    }

    // 星
    const s=document.getElementById('stars');
    for(let i=0;i<20;i++){
      const el=document.createElement('div');
      el.className='star';
      const sz=1+Math.random()*1.5;
      el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${2.5+Math.random()*3}s;--delay:${Math.random()*4}s;opacity:0`;
      s.appendChild(el);
    }
  </script>
</body>
</html>
