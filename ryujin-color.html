<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍神カラー診断 - 守護龍神の導き：伶受</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel:wght@400;700&display=swap');

        :root {
            --gold: #e0ca82;
            --gold-dim: #a08840;
            --bg: #010810;
            --bg2: #050d1a;
            --text: #f0e8d0;
            --text-dim: #8a7a5a;
            --border: rgba(224,202,130,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif JP', serif;
            min-height: 100vh;
            padding: 20px 15px 40px;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* 背景の龍の鱗模様 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(224,202,130,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(224,202,130,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 30px 0 25px;
        }

        .header-dragon {
            font-size: 2.5em;
            margin-bottom: 8px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .header h2 {
            font-size: 1.4em;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--text);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            margin: 10px 0;
        }

        .header p {
            font-size: 0.85em;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* 診断カード */
        .quiz-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(224,202,130,0.05);
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .progress-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: all 0.3s;
        }

        .progress-dot.active { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
        .progress-dot.done { background: var(--gold-dim); }

        .question-num {
            font-size: 0.75em;
            color: var(--gold);
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1.05em;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 22px;
            color: var(--text);
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Noto Serif JP', serif;
            font-size: 0.9em;
            padding: 12px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .choice-btn:hover {
            background: rgba(224,202,130,0.08);
            border-color: var(--gold);
            color: var(--gold);
            transform: translateX(4px);
        }

        .choice-btn.selected {
            background: rgba(224,202,130,0.12);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 結果エリア */
        #result { display: none; }

        .result-card {
            border-radius: 15px;
            padding: 30px 20px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.08;
            background: var(--dragon-color, var(--gold));
        }

        .result-dragon-icon {
            font-size: 4em;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        .result-label {
            font-size: 0.75em;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .result-name {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 20px currentColor;
        }

        .result-en {
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .result-color-swatch {
            width: 60px; height: 60px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px var(--dragon-color, var(--gold)), 0 0 40px rgba(0,0,0,0.5);
            background: var(--dragon-color, var(--gold));
        }

        .result-message {
            font-size: 0.9em;
            line-height: 1.9;
            text-align: left;
            color: var(--text);
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid var(--dragon-color, var(--gold));
        }

        .result-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .trait-tag {
            background: rgba(224,202,130,0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8em;
            color: var(--gold);
        }

        .dragon-voice {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
            font-size: 0.88em;
            line-height: 1.9;
            color: var(--text);
            font-style: italic;
            position: relative;
        }

        .dragon-voice::before {
            content: '✦ 龍神様からのメッセージ ✦';
            display: block;
            font-style: normal;
            font-size: 0.8em;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }

        /* アロマ */
        .aroma-section {
            background: rgba(224,202,130,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .aroma-title {
            font-size: 0.8em;
            letter-spacing: 2px;
            color: var(--gold);
            text-align: center;
            margin-bottom: 12px;
        }

        .aroma-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .aroma-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .aroma-name { font-size: 1em; font-weight: 700; color: var(--gold); }
        .aroma-en { font-size: 0.75em; color: var(--text-dim); letter-spacing: 1px; }
        .aroma-reason { font-size: 0.83em; color: var(--text); line-height: 1.7; }

        /* ボタン */
        .btn-reserve {
            background: linear-gradient(135deg, #b8962e, #e0ca82, #b8962e);
            color: #000;
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Serif JP', serif;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(224,202,130,0.3);
        }

        .btn-reserve:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(224,202,130,0.5); }

        .btn-retry {
            background: transparent;
            color: var(--text-dim);
            width: 100%;
            padding: 12px;
            font-size: 0.9em;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Noto Serif JP', serif;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-retry:hover { color: var(--gold); border-color: var(--gold); }

        .footer-note {
            font-size: 0.72em;
            color: #555;
            line-height: 1.7;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        /* フェードイン */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-dragon">🐉</div>
        <h1>RYUJIN COLOR DIAGNOSIS</h1>
        <h2>龍神カラー診断</h2>

        </div>

        <button class="btn-retry" onclick="restartQuiz()">🔄 もう一度診断する</button>

        <div class="footer-note">
            <p>※ 本ツールは簡易版としてお使いください。</p>

            <p>※ 入力された情報はサーバーに送信・保存されません。</p>
        </div>
    </div>

</div>

// ===== スコア管理 =====
let scores = {};
let currentQ = 0;

function initScores() {
    scores = {};
    Object.keys(DRAGONS).forEach(k => scores[k] = 0);
}

function startQuiz() {
    initScores();
    currentQ = 0;
    renderQuestion();
}

function renderQuestion() {
    const q = QUESTIONS[currentQ];

    // プログレスドット
    let dots = '';
    for (let i = 0; i < QUESTIONS.length; i++) {
        let cls = i < currentQ ? 'done' : (i === currentQ ? 'active' : '');
        dots += `<div class="progress-dot ${cls}"></div>`;
    }
    document.getElementById('progress').innerHTML = dots;
    document.getElementById('q-num').textContent = `QUESTION ${currentQ + 1} / ${QUESTIONS.length}`;
    document.getElementById('q-text').textContent = q.text;

    const choicesEl = document.getElementById('q-choices');
    choicesEl.innerHTML = '';
    q.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c.text;
        btn.onclick = () => selectChoice(c.scores, btn);
        choicesEl.appendChild(btn);
    });

    document.getElementById('quiz').classList.add('fade-in');
}

function selectChoice(choiceScores, btn) {
    // 選択演出
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    btn.classList.add('selected');

    // スコア加算
    Object.entries(choiceScores).forEach(([k, v]) => {
        if (scores[k] !== undefined) scores[k] += v;
    });

    setTimeout(() => {
        currentQ++;
        if (currentQ < QUESTIONS.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }, 400);
}

function showResult() {
    // 最高スコアの龍神を選出
    const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    const dragon = DRAGONS[top];

    document.getElementById('quiz').style.display = 'none';
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';

    // カードの色設定
    document.getElementById('result-card').style.setProperty('--dragon-color', dragon.color);
    document.getElementById('res-swatch').style.background = dragon.color;
    document.getElementById('res-swatch').style.boxShadow = `0 0 20px ${dragon.color}, 0 0 40px rgba(0,0,0,0.5)`;

    document.getElementById('res-icon').textContent = dragon.icon;
    document.getElementById('res-name').textContent = dragon.name;
    document.getElementById('res-name').style.color = dragon.color;
    document.getElementById('res-en').textContent = dragon.en;
    document.getElementById('res-message').textContent = dragon.message;
    document.getElementById('res-voice').textContent = dragon.voice;

    // 特性タグ
    document.getElementById('res-traits').innerHTML = dragon.traits.map(t =>
        `<span class="trait-tag">${t}</span>`
    ).join('');

    // アロマ（ランダム2〜3個）
    const aromaCount = Math.floor(Math.random() * 2) + 2;
    const aromaIdx = dragon.aroma.map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, aromaCount);
    document.getElementById('res-aroma').innerHTML = aromaIdx.map(i => {
        const a = dragon.aroma[i];
        return `<div class="aroma-item">
            <div class="aroma-name">${a.name}</div>
            <div class="aroma-en">${a.en}</div>
            <div class="aroma-reason">${a.reason}</div>
        </div>`;
    }).join('');

    resultEl.classList.add('fade-in');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restartQuiz() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    startQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 起動
startQuiz();
