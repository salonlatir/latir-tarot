<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーラカラー診断 - 魂の色彩：伶受</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Cinzel:wght@400;700&display=swap');

        :root {
            --gold: #e0ca82;
            --gold-dim: #a08840;
            --bg: #010810;
            --text: #f0e8d0;
            --text-dim: #8a7a5a;
            --border: rgba(224,202,130,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif JP', serif;
            min-height: 100vh;
            padding: 20px 15px 40px;
            line-height: 1.7;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(224,202,130,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(224,202,130,0.02) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 30px 0 25px;
        }

        .header-icon {
            font-size: 2.8em;
            margin-bottom: 8px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.85; }
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .header h2 {
            font-size: 1.4em;
            font-weight: 300;
            letter-spacing: 3px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            margin: 10px 0;
        }

        .header p {
            font-size: 0.85em;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* 診断カード */
        .quiz-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 28px 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(224,202,130,0.05);
        }

        .progress-wrap {
            margin-bottom: 22px;
        }

        .progress-bar-track {
            height: 3px;
            background: rgba(224,202,130,0.15);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.75em;
            color: var(--gold);
            letter-spacing: 3px;
            text-align: center;
        }

        .question-text {
            font-size: 1.05em;
            text-align: center;
            line-height: 1.9;
            margin-bottom: 24px;
            color: var(--text);
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Noto Serif JP', serif;
            font-size: 0.9em;
            padding: 13px 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .choice-btn:hover {
            background: rgba(224,202,130,0.08);
            border-color: var(--gold);
            color: var(--gold);
            transform: translateX(5px);
        }

        .choice-btn.selected {
            background: rgba(224,202,130,0.12);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 結果 */
        #result { display: none; }

        .aura-visual {
            text-align: center;
            padding: 35px 20px 25px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 15px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .aura-rings {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .aura-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--aura-color, var(--gold));
            opacity: 0.2;
            animation: expandRing 3s ease-out infinite;
        }

        .aura-ring:nth-child(1) { inset: 0; animation-delay: 0s; }
        .aura-ring:nth-child(2) { inset: -15px; animation-delay: 0.8s; }
        .aura-ring:nth-child(3) { inset: -30px; animation-delay: 1.6s; }

        @keyframes expandRing {
            0% { opacity: 0.4; transform: scale(0.95); }
            100% { opacity: 0; transform: scale(1.15); }
        }

        .aura-core {
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--aura-color, var(--gold)) 0%, transparent 70%);
            opacity: 0.5;
            animation: pulse 2.5s ease-in-out infinite;
        }

        .aura-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            z-index: 1;
        }

        .result-label {
            font-size: 0.75em;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .result-name {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 4px;
            text-shadow: 0 0 20px var(--aura-color, var(--gold));
        }

        .result-en {
            font-family: 'Cinzel', serif;
            font-size: 0.8em;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 18px;
        }

        .result-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .trait-tag {
            background: rgba(224,202,130,0.08);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78em;
            color: var(--gold);
        }

        .result-message {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-left: 3px solid var(--aura-color, var(--gold));
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
            font-size: 0.88em;
            line-height: 1.9;
        }

        .aura-voice {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 18px;
            font-size: 0.87em;
            line-height: 1.9;
            font-style: italic;
            position: relative;
        }

        .aura-voice::before {
            content: '✦ あなたのオーラからのメッセージ ✦';
            display: block;
            font-style: normal;
            font-size: 0.78em;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 10px;
            text-align: center;
        }

        /* 第二オーラ */
        .second-aura {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 18px;
            font-size: 0.85em;
            text-align: center;
        }

        .second-aura-label {
            font-size: 0.75em;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .second-aura-name {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .second-aura-desc {
            font-size: 0.82em;
            color: var(--text-dim);
            line-height: 1.7;
        }

        /* アロマ */
        .aroma-section {
            background: rgba(224,202,130,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .aroma-title {
            font-size: 0.8em;
            letter-spacing: 2px;
            color: var(--gold);
            text-align: center;
            margin-bottom: 14px;
        }

        .aroma-items { display: flex; flex-direction: column; gap: 12px; }

        .aroma-item { display: flex; flex-direction: column; gap: 3px; }
        .aroma-name { font-size: 1em; font-weight: 700; color: var(--gold); }
        .aroma-en { font-size: 0.75em; color: var(--text-dim); letter-spacing: 1px; }
        .aroma-reason { font-size: 0.83em; color: var(--text); line-height: 1.7; }

        /* ボタン */
        .btn-reserve {
            background: linear-gradient(135deg, #b8962e, #e0ca82, #b8962e);
            color: #000;
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Serif JP', serif;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(224,202,130,0.3);
        }

        .btn-reserve:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(224,202,130,0.5); }

        .btn-retry {
            background: transparent;
            color: var(--text-dim);
            width: 100%;
            padding: 12px;
            font-size: 0.9em;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Noto Serif JP', serif;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-retry:hover { color: var(--gold); border-color: var(--gold); }

        .footer-note {
            font-size: 0.72em;
            color: #555;
            line-height: 1.7;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-icon">✨</div>
        <h1>AURA COLOR DIAGNOSIS</h1>
        <h2>オーラカラー診断</h2>
        <p>あなたの魂が放つ、本当の色を読み解きます</p>
    </div>

    <div id="quiz">
        <div class="quiz-card">
            <div class="progress-wrap">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="q-num"></div>
            </div>
            <div class="question-text" id="q-text"></div>
            <div class="choices" id="q-choices"></div>
        </div>
    </div>

    <div id="result">
        <div class="aura-visual" id="aura-visual">
            <div class="aura-rings" id="aura-rings">
                <div class="aura-ring"></div>
                <div class="aura-ring"></div>
                <div class="aura-ring"></div>
                <div class="aura-core" id="aura-core"></div>
                <div class="aura-icon" id="res-icon"></div>
            </div>
            <div class="result-label">あなたのオーラカラーは</div>
            <div class="result-name" id="res-name"></div>
            <div class="result-en" id="res-en"></div>
            <div class="result-traits" id="res-traits"></div>
        </div>

        <div class="result-message" id="res-message"></div>
        <div class="aura-voice" id="res-voice"></div>

        <div class="second-aura" id="second-aura-box">
            <div class="second-aura-label">◈ サブオーラカラー ◈</div>
            <div class="second-aura-name" id="second-name"></div>
            <div class="second-aura-desc" id="second-desc"></div>
        </div>

        <div class="aroma-section">
            <div class="aroma-title">◈ あなたのオーラを輝かせるアロマ ◈</div>
            <div class="aroma-items" id="res-aroma"></div>
        </div>

        <div style="text-align:center; margin-bottom:20px;">
            <p style="font-size:0.85em; color:#ccc; margin-bottom:12px;">オーラカラーの意味をさらに深く読み解きたい方へ。<br>伶受のサイキックタロット・霊視鑑定で、あなたの今と未来を具体的にお伝えします。</p>
            <p style="color:var(--gold); font-weight:bold; margin-bottom:12px; font-size:0.95em;">◈ 伶受 サイキックタロット鑑定 ◈</p>
            <a href="https://form.run/@latir" target="_blank" style="text-decoration:none;">
                <button class="btn-reserve">ご予約はこちら</button>
            </a>
        </div>

        <button class="btn-retry" onclick="restartQuiz()">🔄 もう一度診断する</button>

        <div class="footer-note">
            <p>※ 本ツールは簡易版としてお使いください。</p>
            <p>※ 診断結果はスピリチュアルな観点に基づく目安であり、個人の行動・選択を保証するものではありません。</p>
            <p>※ 入力された情報はサーバーに送信・保存されません。</p>
        </div>
    </div>

</div>

let scores = {};
let currentQ = 0;

function initScores() {
    scores = {};
    Object.keys(AURAS).forEach(k => scores[k] = 0);
}

function startQuiz() {
    initScores();
    currentQ = 0;
    renderQuestion();
}

function renderQuestion() {
    const q = QUESTIONS[currentQ];
    const pct = (currentQ / QUESTIONS.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-num').textContent = `QUESTION ${currentQ + 1} / ${QUESTIONS.length}`;
    document.getElementById('q-text').textContent = q.text;

    const choicesEl = document.getElementById('q-choices');
    choicesEl.innerHTML = '';
    q.choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c.text;
        btn.onclick = () => selectChoice(c.scores, btn);
        choicesEl.appendChild(btn);
    });
}

function selectChoice(choiceScores, btn) {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    btn.classList.add('selected');
    Object.entries(choiceScores).forEach(([k, v]) => {
        if (scores[k] !== undefined) scores[k] += v;
    });
    setTimeout(() => {
        currentQ++;
        if (currentQ < QUESTIONS.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }, 400);
}

function showResult() {
    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const topKey = sorted[0][0];
    const secondKey = sorted[1][0];
    const aura = AURAS[topKey];
    const second = AURAS[secondKey];

    document.getElementById('quiz').style.display = 'none';
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';

    // オーラビジュアル
    const rings = document.querySelectorAll('.aura-ring');
    rings.forEach(r => r.style.borderColor = aura.color);
    document.getElementById('aura-core').style.background =
        `radial-gradient(circle, ${aura.color} 0%, transparent 70%)`;
    document.getElementById('aura-visual').style.setProperty('--aura-color', aura.color);
    document.getElementById('res-message').style.borderLeftColor = aura.color;

    document.getElementById('res-icon').textContent = aura.icon;
    document.getElementById('res-name').textContent = aura.name;
    document.getElementById('res-name').style.color = aura.color;
    document.getElementById('res-en').textContent = aura.en;
    document.getElementById('res-message').textContent = aura.message;
    document.getElementById('res-voice').textContent = aura.voice;

    document.getElementById('res-traits').innerHTML = aura.traits.map(t =>
        `<span class="trait-tag">${t}</span>`
    ).join('');

    // サブオーラ
    document.getElementById('second-name').textContent = second.name + 'のオーラも持っています';
    document.getElementById('second-name').style.color = second.color;
    document.getElementById('second-desc').textContent = second.subDesc;

    // アロマ（ランダム2〜3個）
    const count = Math.floor(Math.random() * 2) + 2;
    const idx = aura.aroma.map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, count);
    document.getElementById('res-aroma').innerHTML = idx.map(i => {
        const a = aura.aroma[i];
        return `<div class="aroma-item">
            <div class="aroma-name">${a.name}</div>
            <div class="aroma-en">${a.en}</div>
            <div class="aroma-reason">${a.reason}</div>
        </div>`;
    }).join('');

    resultEl.classList.add('fade-in');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restartQuiz() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    startQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

startQuiz();
