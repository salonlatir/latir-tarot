<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伶受の九星気学 | Latir</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="apple-touch-icon" href="./kyuseikigaku-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Latir九星気学">
  <link rel="icon" type="image/png" sizes="192x192" href="./kyuseikigaku-192.png">
  <meta http-equiv="refresh" content="2;url=https://salonlatir.wixsite.com/salon/kyuseikigaku">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Cinzel:wght@400;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0800;color:#e8e0d0;font-family:'Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(201,168,76,.08) 0%,transparent 70%);pointer-events:none}
    .container{text-align:center;padding:40px 24px;position:relative;z-index:1;animation:fadeIn .8s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .icon-wrap{width:120px;height:120px;margin:0 auto 28px;border-radius:26px;overflow:hidden;box-shadow:0 0 40px rgba(201,168,76,.3),0 8px 32px rgba(0,0,0,.8);animation:pulse 2.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(201,168,76,.25),0 8px 32px rgba(0,0,0,.8)}50%{box-shadow:0 0 55px rgba(201,168,76,.45),0 8px 32px rgba(0,0,0,.8)}}
    .icon-wrap img{width:100%;height:100%;object-fit:cover}
    .label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;color:#c9a84c;text-transform:uppercase;margin-bottom:12px;opacity:.8}
    h1{font-size:20px;font-weight:300;letter-spacing:.15em;color:#e8d08a;margin-bottom:6px;line-height:1.5}
    .subtitle{font-size:12px;color:#9a8f7a;letter-spacing:.08em;margin-bottom:40px}
    .loading-wrap{width:200px;margin:0 auto 20px}
    .loading-bar-bg{height:1px;background:rgba(201,168,76,.15);border-radius:1px;overflow:hidden;margin-bottom:14px}
    .loading-bar{height:100%;background:linear-gradient(90deg,#8a6e30,#f0d878,#8a6e30);border-radius:1px;animation:loading 2s ease forwards}
    @keyframes loading{from{width:0%}to{width:100%}}
    .loading-text{font-size:11px;color:#6a6055;letter-spacing:.15em;animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
    .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:24px auto;opacity:.5}
    .note{font-size:11px;color:#4a4035;letter-spacing:.06em;line-height:1.8}
    .note a{color:#8a6e30;text-decoration:none}
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
    .star{position:absolute;width:2px;height:2px;background:#c9a84c;border-radius:50%;animation:twinkle var(--dur) var(--delay) ease-in-out infinite}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.7;transform:scale(1)}}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="icon-wrap">
      <img src="./kyuseikigaku-512.png" alt="九星気学">
    </div>
    <div class="label">Latir × 占いの部屋</div>
    <h1>🐉 九星気学</h1>
    <p class="subtitle">伶受監修の占いシミュレーター</p>
    <div class="loading-wrap">
      <div class="loading-bar-bg"><div class="loading-bar"></div></div>
      <div class="loading-text">opening...</div>
    </div>
    <div class="divider"></div>
    <p class="note">自動で移動しない場合は<br><a href="https://salonlatir.wixsite.com/salon/kyuseikigaku">こちらをタップ</a></p>
  </div>
  <script>
    if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
    const s=document.getElementById('stars');
    for(let i=0;i<28;i++){const el=document.createElement('div');el.className='star';el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;--delay:${Math.random()*3}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;opacity:0`;s.appendChild(el);}
    setTimeout(()=>window.location.href='https://salonlatir.wixsite.com/salon/kyuseikigaku',2000);
  </script>
</body>
</html>
